version: '3.8'
services:

  postgres:
    image: postgres:15
    container_name: grid07_postgres
    environment:
      POSTGRES_DB: grid07
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: grid07_redis
    ports:
      - "6379:6379"